defaults:
  - model: qwen_small
  - _self_

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .

tokenizer_path: "./models/lfm2_5_base/"
saved_checkpoint_path: "./models/lfm2_5_base/"

# Training
learning_rate: 1e-4
batch_size: 8
num_epochs: 1
total_steps: 100
total_tokens: 500000
num_workers: 4
max_grad_norm: 1.0

# Optimizer
eps: 1e-10
betas:
  - 0.9
  - 0.95
weight_decay: 0.001

# Scheduler
warmup_steps: 10

# Validation
val_check_interval: 50
val_size: 15000

# Accelerate
gradient_accumulation_steps: 1
mixed_precision: "bf16"

# Data
max_seq_length: 2048
use_packed_data: true

# Logging
project_name: "test_run_lfm25"
auto_log_gpu: true
log_every_n: 10

# Checkpoint saving
save_dir: "checkpoints"
save_top_k: 1
save_every_n_steps: 500
save_last: true
max_shard_size: "5GB"

# Evaluation
evaluation:
  enabled: false
  humaneval:
    enabled: false
    num_samples: 50
    max_new_tokens: 512
    temperature: 0.0
  mmlu:
    enabled: false
    num_samples: 100
    temperature: 0.0
  ifeval:
    enabled: false
    num_samples: 50
    max_new_tokens: 512
    temperature: 0.0
  log_predictions: false
  save_results_dir: "eval_results"
