defaults:
  - model: qwen_small
  - _self_

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .

tokenizer_path: "./models/lfm2_5_base/"
saved_checkpoint_path: "./models/lfm2_5_base/"

# Training
learning_rate: 1e-4
batch_size: 14
num_epochs: 1
total_steps: 100
total_tokens: 1_000_000
num_workers: 4
max_grad_norm: 1.0

# Optimizer
eps: 1e-10
betas:
  - 0.9
  - 0.95
weight_decay: 0.001

# Scheduler
warmup_steps: 1000

# Validation
val_check_interval: 1000
val_size: 20000

# Accelerate
gradient_accumulation_steps: 1
mixed_precision: "bf16"

# Data
max_seq_length: 2048
use_packed_data: true

# Model
compile: "torch"

# Logging
project_name: "lfm2_5_base_cpt_gr"
auto_log_gpu: true
log_every_n: 10

# Checkpoint saving
save_dir: "checkpoints"
# Subdir name under save_dir. Falls back to model.name when null. Set this when
# resuming from saved_checkpoint_path so the run dir isn't named after an unused
# model config (e.g. qwen_small).
experiment_name: "lfm2_5_base"
save_top_k: 1
save_every_n_steps: 1000
save_last: true
max_shard_size: "5GB"

# Evaluation
evaluation:
  enabled: false
  humaneval:
    enabled: false
    num_samples: 50
    max_new_tokens: 512
    temperature: 0.0
  mmlu:
    enabled: false
    num_samples: 100
    temperature: 0.0
  ifeval:
    enabled: false
    num_samples: 50
    max_new_tokens: 512
    temperature: 0.0
  log_predictions: false
  save_results_dir: "eval_results"
