defaults:
  - model: qwen_small
  - _self_

hydra:
  job:
    chdir: false
  output_subdir: null
  run:
    dir: .

# Run-level (top-level) settings
saved_checkpoint_path: "/home/l40s/alexliap/pretrain/checkpoints/lfm2_5_base/v2_1b_tokens/last"
compile: "torch"
num_epochs: 1
total_steps: 100
total_tokens: 2_000_000_000

# LoRA adapter (optional). Omit or set to null for full-parameter training.
# When set, the model is wrapped with a LoRA adapter and only the adapter is
# saved into each checkpoint (the base comes from saved_checkpoint_path).
# Recommended to set `compile: null` when using LoRA.
lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0.00
  target_modules: ["q_proj", "v_proj"]   # null lets peft auto-infer instead

# Data
data:
  tokenizer_path: "./models/lfm2_5_base/"
  max_seq_length: 2048
  use_packed_data: true
  num_workers: 4
  train_batch_size: 16
  val_batch_size: 16

# Optimizer
optimizer:
  learning_rate: 1e-4
  eps: 1e-10
  betas:
    - 0.9
    - 0.95
  weight_decay: 0.001
  max_grad_norm: 1.0

# Scheduler
scheduler:
  warmup_steps: 1000

# Accelerate
accelerate:
  gradient_accumulation_steps: 1
  mixed_precision: "bf16"

# Validation
validation:
  val_check_interval: 1000
  val_size: 40000

# Logging
logging:
  project_name: "lfm2_5_base_lora_cpt_gr"
  auto_log_gpu: true
  log_every_n: 10

# Checkpoint saving
checkpoint:
  save_dir: "checkpoints"
  # Subdir name under save_dir. Falls back to model.name when null. Set this when
  # resuming from saved_checkpoint_path so the run dir isn't named after an unused
  # model config (e.g. qwen_small).
  experiment_name: "lfm2_5_base"
  run_name: "v3_2b_tokens"
  save_top_k: 1
  save_every_n_steps: 1000
  save_last: true
  max_shard_size: "5GB"

# Evaluation
evaluation:
  enabled: false
  humaneval:
    enabled: false
    num_samples: 50
    max_new_tokens: 512
    temperature: 0.0
  mmlu:
    enabled: false
    num_samples: 100
    temperature: 0.0
  ifeval:
    enabled: false
    num_samples: 50
    max_new_tokens: 512
    temperature: 0.0
  log_predictions: false
  save_results_dir: "eval_results"
